<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .wheel-container {
            position: relative;
            margin: 30px auto;
            width: 400px;
            height: 400px;
        }

        .wheel {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 10px solid #333;
            transition: transform 4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
        }

        .wheel-text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            transform: rotate(-22.5deg);
            width: 100px;
            text-align: center;
            top: 40px;
            left: 60px;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #333;
            z-index: 10;
        }

        .spin-button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            margin-top: 30px;
        }

        .spin-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .spin-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            border-radius: 15px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .result.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 480px) {
            .wheel-container {
                width: 320px;
                height: 320px;
            }
           
            .wheel {
                width: 320px;
                height: 320px;
            }
           
            h1 {
                font-size: 2rem;
            }
           
            .game-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Spin the Wheel! 🎯</h1>
       
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <!-- Sections will be generated by JavaScript -->
            </div>
        </div>

        <button class="spin-button" id="spinBtn" onclick="spinWheel()">
            SPIN THE WHEEL!
        </button>

        <div class="result" id="result">
            Click the button to spin and win!
        </div>
    </div>

    <script>
        // CUSTOMIZE YOUR WHEEL HERE - Just edit this array!
        const options = [
            "Alice",
            "Bob",
            "Charlie",
            "Diana",
            "Emma",
            "Frank",
            "Grace",
            "Henry",
"Steve"
        ];

        // Color palette for the wheel sections
        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4',
            '#feca57', '#ff9ff3', '#54a0ff', '#5f27cd',
            '#ff7675', '#74b9ff', '#a29bfe', '#fd79a8',
            '#fdcb6e', '#6c5ce7', '#00b894', '#e17055'
        ];

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const result = document.getElementById('result');
       
        let isSpinning = false;
        let currentRotation = 0;

        // Generate wheel sections based on options
        function createWheel() {
            wheel.innerHTML = ''; // Clear existing sections
           
            const sectionAngle = 360 / options.length;
           
            options.forEach((option, index) => {
                const section = document.createElement('div');
                section.className = 'wheel-section';
                section.style.background = colors[index % colors.length];
                section.style.transform = `rotate(${index * sectionAngle}deg)`;
               
                const text = document.createElement('div');
                text.className = 'wheel-text';
                text.textContent = option;
               
                section.appendChild(text);
                wheel.appendChild(section);
            });
        }

        function spinWheel() {
            if (isSpinning) return;
           
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.textContent = 'SPINNING...';
           
            // Hide previous result
            result.classList.remove('show');
           
            // Generate random spin (multiple full rotations + random position)
            const spins = Math.floor(Math.random() * 5) + 5; // 5-9 full rotations
            const finalPosition = Math.floor(Math.random() * 360);
            const totalRotation = currentRotation + (spins * 360) + finalPosition;
           
            // Apply rotation
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            currentRotation = totalRotation % 360;
           
            // Calculate which section we landed on
            const sectionAngle = 360 / options.length;
            const normalizedPosition = (360 - (currentRotation % 360) + (sectionAngle / 2)) % 360;
            const winningSection = Math.floor(normalizedPosition / sectionAngle);
           
            // Show result after spin animation completes
            setTimeout(() => {
                result.textContent = `🎉 Winner: ${options[winningSection]} 🎉`;
                result.classList.add('show');
               
                isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.textContent = 'SPIN AGAIN!';
            }, 4000);
        }

        // Initialize the wheel when page loads
        createWheel();

        // Show initial message
        setTimeout(() => {
            result.classList.add('show');
        }, 500);
    </script>
