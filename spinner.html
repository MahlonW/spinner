<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin the Wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            position: relative;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .wheel-container {
            position: relative;
            margin: 30px auto;
            width: 400px;
            height: 400px;
        }

        .wheel {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            border: 10px solid #333;
            box-shadow: inset 0 0 0 6px rgba(255,255,255,0.4), 0 0 0 6px rgba(0,0,0,0.05);
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.25), rgba(0,0,0,0) 60%);
            transition: transform 4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .wheel::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #ddd);
            border: 4px solid #333;
            border-radius: 50%;
            z-index: 5;
        }

        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
        }

        .wheel-text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            pointer-events: none;
        }

        .pointer {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 34px solid #333;
            z-index: 10;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.35));
        }

        .spin-button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            margin-top: 30px;
        }

        .spin-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .spin-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            border-radius: 15px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .result.show {
            opacity: 1;
            transform: translateY(0);
        }

        .icon-button {
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            color: #374151;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .icon-button:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }

        .settings-button {
            position: absolute;
            top: 16px;
            right: 16px;
        }

        .hidden { display: none; }

        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 50;
        }

        .settings-modal {
            width: 100%;
            max-width: 560px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .settings-body {
            padding: 20px;
        }

        .field-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .field-row input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
        }

        .names-list {
            list-style: none;
            text-align: left;
            margin: 0;
            padding: 0;
            max-height: 240px;
            overflow: auto;
            border: 1px solid #f3f4f6;
            border-radius: 12px;
        }

        .names-list li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
        }

        .names-list li:last-child { border-bottom: none; }

        .danger {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }

        .small {
            font-size: 12px;
            color: #6b7280;
        }

        @media (max-width: 480px) {
            .wheel-container {
                width: 320px;
                height: 320px;
            }
           
            .wheel {
                width: 320px;
                height: 320px;
            }
           
            h1 {
                font-size: 2rem;
            }
           
            .game-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎯 Spin the Wheel! 🎯</h1>
        <button class="icon-button settings-button" id="openSettings" aria-haspopup="dialog" aria-controls="settingsDialog" aria-label="Open settings">⚙️ Settings</button>
       
        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <!-- Sections will be generated by JavaScript -->
            </div>
        </div>

        <button class="spin-button" id="spinBtn" onclick="spinWheel()">
            SPIN THE WHEEL!
        </button>

        <div class="result" id="result">
            Click the button to spin and win!
        </div>
    </div>

    <!-- Static settings modal to ensure reliable behavior -->
    <div class="settings-overlay hidden" id="settingsDialog" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" tabindex="-1">
        <div class="settings-modal" role="document">
            <div class="settings-header">
                <h2 id="settingsTitle">Settings</h2>
                <button class="icon-button" id="closeSettings" data-close="settings" type="button" aria-label="Close settings" onclick="closeSettings()">✖</button>
            </div>
            <div class="settings-body">
                <div class="field-row">
                    <input type="text" id="nameInput" placeholder="Add a name" aria-label="Name" />
                    <button class="icon-button" id="addNameBtn" type="button">Add</button>
                </div>
                <ul class="names-list" id="namesList" aria-label="Names list"></ul>
                <div class="footer-actions">
                    <button class="icon-button danger" id="resetDefaults" type="button">Reset to defaults</button>
                    <span class="small">Changes save automatically</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Persisted names list
        const STORAGE_KEY = 'spinnerOptions:v1';
        const DEFAULT_OPTIONS = [
            "Alice",
            "Bob",
            "Charlie",
            "Diana",
            "Emma",
            "Frank",
            "Grace",
            "Henry",
            "Steve"
        ];
        let options = [];

        // Color palette for the wheel sections
        const colors = [
            '#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4',
            '#feca57', '#ff9ff3', '#54a0ff', '#5f27cd',
            '#ff7675', '#74b9ff', '#a29bfe', '#fd79a8',
            '#fdcb6e', '#6c5ce7', '#00b894', '#e17055'
        ];

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const result = document.getElementById('result');
        const openSettingsBtn = document.getElementById('openSettings');
        const settingsOverlay = document.getElementById('settingsDialog');
       
        let isSpinning = false;
        let currentRotation = 0;

        function loadOptions() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return [...DEFAULT_OPTIONS];
                const parsed = JSON.parse(raw);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    return parsed.map(v => String(v)).slice(0, 64);
                }
                return [...DEFAULT_OPTIONS];
            } catch (_) {
                return [...DEFAULT_OPTIONS];
            }
        }

        function saveOptions() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(options));
        }

        // Generate wheel based on options using conic-gradient for slices
        function createWheel() {
            wheel.innerHTML = ''; // Clear existing labels
            if (options.length === 0) {
                wheel.style.backgroundImage = '';
                return;
            }

            const sectionAngle = 360 / options.length;

            // Build conic-gradient for the wheel slices
            const segments = [];
            for (let i = 0; i < options.length; i++) {
                const start = i * sectionAngle;
                const end = start + sectionAngle;
                const color = colors[i % colors.length];
                segments.push(`${color} ${start}deg ${end}deg`);
            }
            const radialShade = 'radial-gradient(circle at 50% 50%, rgba(255,255,255,0.25), rgba(0,0,0,0) 60%)';
            const conic = `conic-gradient(from -90deg, ${segments.join(', ')})`;
            wheel.style.backgroundImage = `${radialShade}, ${conic}`;

            // Add labels positioned along the center of each slice
            const radius = Math.max(0, (wheel.clientWidth / 2) - 70);
            options.forEach((option, index) => {
                const midAngle = (index * sectionAngle) + (sectionAngle / 2);
                const text = document.createElement('div');
                text.className = 'wheel-text';
                text.textContent = option;
                text.style.transform = `translate(-50%, -50%) rotate(${midAngle}deg) translate(${radius}px) rotate(${-midAngle}deg)`;
                wheel.appendChild(text);
            });

            // Enable/disable spin button if insufficient options
            if (options.length < 2) {
                spinBtn.disabled = true;
                result.textContent = 'Add at least 2 names to spin.';
                result.classList.add('show');
            } else {
                spinBtn.disabled = false;
            }
        }

        function spinWheel() {
            if (isSpinning) return;
           
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.textContent = 'SPINNING...';
           
            // Hide previous result
            result.classList.remove('show');
           
            // Generate random spin (multiple full rotations + random position)
            const spins = Math.floor(Math.random() * 5) + 5; // 5-9 full rotations
            const finalPosition = Math.floor(Math.random() * 360);
            const totalRotation = currentRotation + (spins * 360) + finalPosition;
           
            // Apply rotation
            wheel.style.transform = `rotate(${totalRotation}deg)`;
            currentRotation = totalRotation % 360;
           
            // Calculate which section we landed on
            const sectionAngle = 360 / options.length;
            const normalizedPosition = (360 - (currentRotation % 360) + (sectionAngle / 2)) % 360;
            const winningSection = Math.floor(normalizedPosition / sectionAngle);
           
            // Show result after spin animation completes
            setTimeout(() => {
                result.textContent = `🎉 Winner: ${options[winningSection]} 🎉`;
                result.classList.add('show');
               
                isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.textContent = 'SPIN AGAIN!';
            }, 4000);
        }

        // Settings modal logic (static modal in DOM)
        settingsOverlay.setAttribute('tabindex', '-1');

        function renderNamesList() {
            const list = document.getElementById('namesList');
            list.innerHTML = '';
            options.forEach((name, index) => {
                const li = document.createElement('li');
                const span = document.createElement('span');
                span.textContent = name;
                const remove = document.createElement('button');
                remove.className = 'icon-button';
                remove.setAttribute('aria-label', `Remove ${name}`);
                remove.textContent = 'Remove';
                remove.addEventListener('click', () => {
                    options.splice(index, 1);
                    saveOptions();
                    createWheel();
                    renderNamesList();
                });
                li.appendChild(span);
                li.appendChild(remove);
                list.appendChild(li);
            });
        }

        function openSettings() {
            settingsOverlay.classList.remove('hidden');
            const input = document.getElementById('nameInput');
            setTimeout(() => input && input.focus(), 0);
        }

        function closeSettings() {
            settingsOverlay.classList.add('hidden');
            openSettingsBtn && openSettingsBtn.focus();
        }
        // Ensure global access for inline onclick
        window.closeSettings = closeSettings;

        function addName(name) {
            const trimmed = String(name || '').trim();
            if (!trimmed) return;
            if (options.includes(trimmed)) return;
            options.push(trimmed);
            saveOptions();
            createWheel();
            renderNamesList();
        }

        // Wire up events
        openSettingsBtn.addEventListener('click', openSettings);
        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) closeSettings();
        });
        settingsOverlay.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSettings();
        });
        const closeBtn = document.getElementById('closeSettings');
        if (closeBtn) closeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            closeSettings();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !settingsOverlay.classList.contains('hidden')) closeSettings();
        });
        // Recompute labels on resize to keep them centered along slices
        window.addEventListener('resize', () => {
            createWheel();
        });
        document.getElementById('addNameBtn').addEventListener('click', () => {
            const input = document.getElementById('nameInput');
            addName(input.value);
            input.value = '';
            input.focus();
        });
        document.getElementById('nameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                addName(e.target.value);
                e.target.value = '';
            }
        });
        document.getElementById('resetDefaults').addEventListener('click', () => {
            options = [...DEFAULT_OPTIONS];
            saveOptions();
            createWheel();
            renderNamesList();
        });

        // Initialize the wheel when page loads
        options = loadOptions();
        createWheel();
        renderNamesList();

        // Show initial message
        setTimeout(() => {
            result.classList.add('show');
        }, 500);
    </script>
</body>
</html>
